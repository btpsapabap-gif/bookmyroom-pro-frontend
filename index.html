<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1.0">

    <title>BookMyRoom Pro</title>

    <link
        rel="stylesheet"
        href="css/styles.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo">

            🏨

            <h1>

                BookMyRoom

            </h1>

            <p>

                Smart Room Booking System

            </p>

        </div>

        <!-- Tabs -->

        <div class="tabs">

            <button
                id="adminTab"
                class="tab active">

                Admin

            </button>

            <button
                id="guestTab"
                class="tab">

                Guest

            </button>

        </div>

        <!-- ==========================
             ADMIN LOGIN
        =========================== -->

        <div
            id="adminLogin"
            class="tab-content">

            <div class="form-group">

                <label>

                    Username

                </label>

                <input
                    id="adminUsername"
                    type="text"
                    placeholder="Enter username">

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    id="adminPassword"
                    type="password"
                    placeholder="Password">

            </div>

            <button
                id="adminLoginBtn"
                class="primary-btn">

                Login

            </button>

        </div>

        <!-- ==========================
             GUEST
        =========================== -->

        <div
            id="guestLogin"
            class="tab-content hidden">

            <div class="guest-buttons">

                <button
                    id="showGuestLogin"
                    class="secondary-btn">

                    Login

                </button>

                <button
                    id="showGuestRegister"
                    class="secondary-btn">

                    Register

                </button>

            </div>

            <!-- Login -->

            <div
                id="guestLoginForm">

                <div class="form-group">

                    <label>

                        Mobile

                    </label>

                    <input
                        id="guestMobile"
                        type="tel"
                        placeholder="9876543210">

                </div>

                <div class="form-group">

                    <label>

                        Password

                    </label>

                    <input
                        id="guestPassword"
                        type="password"
                        placeholder="Password">

                </div>

                <button
                    id="guestLoginBtn"
                    class="primary-btn">

                    Login

                </button>

            </div>

            <!-- Register -->

            <div
                id="guestRegisterForm"
                class="hidden">

                <div class="form-group">

                    <label>

                        Full Name

                    </label>

                    <input
                        id="guestName"
                        type="text">

                </div>

                <div class="form-group">

                    <label>

                        Mobile

                    </label>

                    <input
                        id="guestRegisterMobile"
                        type="tel">

                </div>

                <div class="form-group">

                    <label>

                        Password

                    </label>

                    <input
                        id="guestRegisterPassword"
                        type="password">

                </div>

                <button
                    id="guestRegisterBtn"
                    class="primary-btn">

                    Register

                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/config.js"></script>

<script src="js/auth.js"></script>

<script>

const adminTab =
document.getElementById("adminTab");

const guestTab =
document.getElementById("guestTab");

const adminLogin =
document.getElementById("adminLogin");

const guestLogin =
document.getElementById("guestLogin");

adminTab.onclick=()=>{

adminTab.classList.add("active");

guestTab.classList.remove("active");

adminLogin.classList.remove("hidden");

guestLogin.classList.add("hidden");

};

guestTab.onclick=()=>{

guestTab.classList.add("active");

adminTab.classList.remove("active");

guestLogin.classList.remove("hidden");

adminLogin.classList.add("hidden");

};

document.getElementById("showGuestLogin").onclick=()=>{

document
.getElementById("guestLoginForm")
.classList.remove("hidden");

document
.getElementById("guestRegisterForm")
.classList.add("hidden");

};

document.getElementById("showGuestRegister").onclick=()=>{

document
.getElementById("guestRegisterForm")
.classList.remove("hidden");

document
.getElementById("guestLoginForm")
.classList.add("hidden");

};

</script>

</body>

</html>
